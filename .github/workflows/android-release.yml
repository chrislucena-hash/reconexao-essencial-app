name: Android Release

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-android:
    name: Build Android AAB and APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Decode Android keystore
        shell: bash
        run: |
          printf "%s" "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/upload-key.jks

      - name: Configure signing
        shell: bash
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=../upload-key.jks
          EOF

      - name: Build web and sync Capacitor
        run: npm run android:sync

      - name: Build Android App Bundle
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew bundleRelease --no-daemon --console=plain

      - name: Build Android APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon --console=plain

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: reconexao-essencial-release-aab
          path: android/app/build/outputs/bundle/release/*.aab

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: reconexao-essencial-release-apk
          path: android/app/build/outputs/apk/release/*.apk
