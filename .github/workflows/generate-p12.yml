name: Generate P12 Certificate

on:
  workflow_dispatch:

jobs:
  generate-p12:
    name: Generate CSR and self-signed certificate for P12
    runs-on: macos-latest

    steps:
      - name: Generate private key and CSR
        run: |
          # Generate a new 2048-bit RSA private key
          openssl genrsa -out private.key 2048

          # Create a CSR (Certificate Signing Request)
          # Submit this to Apple Developer Portal to get a real certificate
          openssl req -new \
            -key private.key \
            -out distribution.csr \
            -subj "/C=BR/O=Reconexao Essencial/OU=4Q4R9GF6YD/CN=Apple Distribution"

          # Generate a self-signed certificate for testing (valid 365 days)
          openssl x509 -req \
            -in distribution.csr \
            -signkey private.key \
            -out distribution.crt \
            -days 365

          # Show certificate info
          openssl x509 -in distribution.crt -noout -subject -issuer -dates

          # Export .p12 combining private key + self-signed certificate
          PASS="${{ secrets.CERTIFICATE_PASSPHRASE }}"
          if [ -z "$PASS" ]; then
            PASS="reconexao"
          fi

          openssl pkcs12 -export \
            -inkey private.key \
            -in distribution.crt \
            -out certificate.p12 \
            -passout "pass:$PASS"

          echo "P12 generated successfully (with self-signed cert)"
          echo "Password used: $PASS"
          ls -lh certificate.p12
          ls -lh distribution.csr

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: p12-and-csr
          path: |
            certificate.p12
            distribution.csr
          retention-days: 7
