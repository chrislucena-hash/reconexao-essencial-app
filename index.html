
<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reconexão Essencial - Sua Essência</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              aura: {
                violet: '#a855f7',
                indigo: '#6366f1',
                teal: '#2dd4bf',
                emerald: '#10b981',
                gold: '#fbbf24',
                rose: '#f43f5e',
                amber: '#f59e0b',
                sky: '#0ea5e9',
                deep: '#030712'
              },
              nature: {
                900: '#1a2416',
                950: '#0d120b',
              },
              ethereal: {
                50: '#f8fafc',
                400: '#94a3b8',
                500: '#64748b',
                800: '#1e293b',
                900: '#0f172a',
                950: '#020617',
              },
              magic: {
                gold: '#d4af37',
                sand: '#fcfaf7'
              }
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              serif: ['Playfair Display', 'serif'],
            },
            animation: {
              'float': 'float 6s ease-in-out infinite',
              'pulse-soft': 'pulse-soft 4s ease-in-out infinite',
              'hypnotic-glow': 'hypnotic-glow 10s ease-in-out infinite',
              'breath': 'breath 8s ease-in-out infinite',
              'fade-in': 'fadeIn 0.5s ease-out forwards',
              'zoom-in': 'zoomIn 0.5s ease-out forwards',
              'slide-up': 'slideUp 0.6s ease-out forwards',
              'aura-drift': 'auraDrift 20s ease infinite',
            },
            keyframes: {
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-15px)' },
              },
              'pulse-soft': {
                '0%, 100%': { opacity: 1, transform: 'scale(1)' },
                '50%': { opacity: 0.9, transform: 'scale(0.99)' },
              },
              'hypnotic-glow': {
                '0%, 100%': { filter: 'brightness(1) contrast(1)' },
                '50%': { filter: 'brightness(1.3) contrast(1.1) drop-shadow(0 0 20px rgba(139, 92, 246, 0.4))' },
              },
              'breath': {
                '0%, 100%': { transform: 'scale(1)', opacity: 0.5 },
                '50%': { transform: 'scale(1.2)', opacity: 0.8 },
              },
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              zoomIn: {
                '0%': { opacity: '0', transform: 'scale(0.9)' },
                '100%': { opacity: '1', transform: 'scale(1)' },
              },
              slideUp: {
                '0%': { opacity: '0', transform: 'translateY(30px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              auraDrift: {
                '0%, 100%': { transform: 'translate(0,0) scale(1)' },
                '33%': { transform: 'translate(10%, 10%) scale(1.1)' },
                '66%': { transform: 'translate(-5%, 5%) scale(0.9)' },
              }
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #030712;
        color: #f1f5f9;
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
      }
      .glass-mystic {
        background: rgba(255, 255, 255, 0.04);
        backdrop-filter: blur(25px);
        -webkit-backdrop-filter: blur(25px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      }
      .aura-bg {
        position: fixed;
        inset: 0;
        z-index: -1;
        background: radial-gradient(circle at 0% 0%, rgba(168, 85, 247, 0.2) 0%, transparent 60%),
                    radial-gradient(circle at 100% 0%, rgba(45, 212, 191, 0.2) 0%, transparent 60%),
                    radial-gradient(circle at 100% 100%, rgba(244, 63, 94, 0.2) 0%, transparent 60%),
                    radial-gradient(circle at 0% 100%, rgba(251, 191, 36, 0.15) 0%, transparent 60%),
                    radial-gradient(circle at 50% 50%, rgba(99, 102, 241, 0.1) 0%, transparent 70%);
        background-color: #020617;
        overflow: hidden;
      }
      .aura-blob {
        position: absolute;
        width: 90vw;
        height: 90vw;
        border-radius: 50%;
        filter: blur(140px);
        opacity: 0.3;
        animation: aura-drift 30s ease infinite;
      }
      .gradient-text-gold {
        background: linear-gradient(to bottom right, #fbbf24, #d4af37);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .iridescent-border {
        position: relative;
        overflow: hidden;
      }
      .iridescent-border::before {
        content: '';
        position: absolute;
        inset: 0;
        padding: 1px;
        background: linear-gradient(45deg, transparent, rgba(139, 92, 246, 0.3), rgba(16, 185, 129, 0.3), transparent);
        -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
      }
      ::-webkit-scrollbar { width: 0px; }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "@google/genai": "https://esm.sh/@google/genai@^1.40.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="min-h-screen">
    <div class="aura-bg">
      <div class="aura-blob bg-aura-violet top-[-25%] left-[-15%]" style="animation-delay: 0s"></div>
      <div class="aura-blob bg-aura-teal bottom-[-25%] right-[-15%]" style="animation-delay: -5s"></div>
      <div class="aura-blob bg-aura-rose top-[15%] right-[-35%]" style="animation-delay: -10s"></div>
      <div class="aura-blob bg-aura-amber bottom-[15%] left-[-35%]" style="animation-delay: -15s"></div>
      <div class="aura-blob bg-aura-indigo middle-center opacity-20" style="animation-delay: -7s"></div>
      <div class="aura-blob bg-aura-sky top-[40%] left-[10%] opacity-10" style="animation-delay: -12s"></div>
    </div>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
